coverage:
  precision: 2
  round: down
  range: "85...100"

  status:
    project:
      default:
        target: auto
        threshold: 1%
        base: auto
        if_not_found: success
        if_ci_failed: error

    patch:
      default:
        target: 90%
        threshold: 1%
        if_not_found: success
        if_ci_failed: error

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  hide_project_coverage: false
